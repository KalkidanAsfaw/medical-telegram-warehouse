version: 2

models:
  - name: dim_channels
    description: "Channel dimension: descriptive attributes and summary stats, one row per channel."
    columns:
      - name: channel_key
        description: "Surrogate key (md5 of channel_name)."
        tests:
          - unique
          - not_null
      - name: channel_name
        description: "Channel username."
        tests:
          - unique
          - not_null
      - name: channel_type
        description: "Business category: Pharmaceutical / Cosmetics / Medical / Other."
      - name: first_post_date
        description: "Date of the channel's earliest scraped post."
      - name: last_post_date
        description: "Date of the channel's latest scraped post."
      - name: total_posts
        description: "Number of scraped messages for the channel."
      - name: avg_views
        description: "Average view count across the channel's messages."

  - name: dim_dates
    description: "Date dimension: one row per calendar day across the observed message range."
    columns:
      - name: date_key
        description: "Surrogate key in YYYYMMDD integer form."
        tests:
          - unique
          - not_null
      - name: full_date
        description: "Calendar date."
        tests:
          - not_null
      - name: is_weekend
        description: "True for Saturday/Sunday."

  - name: fct_messages
    description: "Message fact table: one row per message with FKs to channel and date dimensions."
    columns:
      - name: message_id
        description: "Telegram message id."
        tests:
          - not_null
      - name: channel_key
        description: "FK to dim_channels."
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: "FK to dim_dates."
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: views
        description: "View count."
      - name: forwards
        description: "Forward count."
      - name: message_length
        description: "Character length of the message text."
      - name: has_image
        description: "Whether an image was downloaded for the message."

  - name: fct_image_detections
    description: "YOLOv8 image detections joined to the message fact; one row per detected object, with channel and date FKs."
    columns:
      - name: message_id
        description: "Telegram message id the detection belongs to."
        tests:
          - not_null
      - name: channel_key
        description: "FK to dim_channels."
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: "FK to dim_dates."
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: detected_class
        description: "COCO class of the detected object (null when nothing detected)."
      - name: confidence_score
        description: "Detection confidence (0-1)."
      - name: image_category
        description: "Derived category for the image."
        tests:
          - accepted_values:
              values: ['promotional', 'product_display', 'lifestyle', 'other']
