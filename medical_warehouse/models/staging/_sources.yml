version: 2

sources:
  - name: raw
    description: "Raw Telegram messages loaded from the data lake by src/load_raw.py."
    schema: raw
    tables:
      - name: telegram_messages
        description: "One row per scraped Telegram message, fields preserved from the API."
        columns:
          - name: message_id
            description: "Telegram message id (unique within a channel)."
          - name: channel_name
            description: "Source channel username."
      - name: image_detections
        description: "YOLOv8 detection results from src/yolo_detect.py; one row per detected object."
        columns:
          - name: message_id
            description: "Telegram message id the image belongs to."
          - name: detected_class
            description: "COCO class name of the detected object (null when nothing detected)."
          - name: confidence_score
            description: "Detection confidence (0-1)."
          - name: image_category
            description: "Derived category: promotional / product_display / lifestyle / other."
